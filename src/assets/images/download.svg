<svg width="700" height="450" viewBox="0 0 700 450" fill="none" xmlns="http://www.w3.org/2000/svg">

<!-- Trophy -->
<rect x="310" y="140" width="80" height="70" rx="10" fill="#FFB703"></rect>
<rect x="330" y="210" width="40" height="20" fill="#2B2D42"></rect>
<rect x="315" y="230" width="70" height="12" rx="4" fill="#2B2D42"></rect>

<!-- Quiz Card -->
<rect x="150" y="170" width="120" height="90" rx="12" fill="white"></rect>
<rect x="165" y="190" width="90" height="10" rx="5" fill="#9CA9F6"></rect>
<rect x="165" y="210" width="70" height="10" rx="5" fill="#9CA9F6"></rect>
<circle cx="175" cy="240" r="8" fill="#06D6A0"></circle>
<circle cx="205" cy="240" r="8" fill="#FB5607"></circle>

<!-- Chart -->
<rect x="440" y="170" width="120" height="90" rx="12" fill="white"></rect>
<rect x="460" y="210" width="12" height="35" fill="#06D6A0"></rect>
<rect x="480" y="195" width="12" height="50" fill="#FFB703"></rect>
<rect x="500" y="220" width="12" height="25" fill="#FB5607"></rect>
<rect x="520" y="185" width="12" height="60" fill="#2B2D42"></rect>

<!-- Question Marks -->
<text x="120" y="140" font-size="40" fill="#FB5607" font-family="Arial">?</text>
<text x="560" y="150" font-size="36" fill="#FFB703" font-family="Arial">?</text>

<!-- Rocket -->
<ellipse cx="540" cy="300" rx="18" ry="35" fill="#FB5607"></ellipse>
<polygon points="540,250 525,280 555,280" fill="#FFB703"></polygon>
<circle cx="540" cy="300" r="6" fill="white"></circle>
<polygon points="522,320 540,350 558,320" fill="#06D6A0"></polygon>

<!-- Decorative circles -->
<circle cx="260" cy="120" r="8" fill="#FFB703"></circle>
<circle cx="420" cy="110" r="6" fill="#06D6A0"></circle>
<circle cx="470" cy="320" r="7" fill="#FB5607"></circle>

</svg>