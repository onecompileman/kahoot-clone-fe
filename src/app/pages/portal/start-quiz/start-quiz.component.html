<div class="khc-start-quiz">
  <div class="d-flex justify-content-start container mt-4">
    <a [routerLink]="['/']" class="btn btn-secondary khc-register__back">Back</a>
  </div>

  <div class="khc-start-quiz__quiz-card mt-5">
    <span class="khc-start-quiz__quiz-card-title">Start Quiz</span>

    <div class="d-flex mt-4 gap-3">
      <span class="badge badge-secondary bg-secondary">Up to 15 players</span>
      <span class="badge badge-secondary bg-secondary">Interactive quiz experience</span>
    </div>

    <p>
      Friends can join your quiz by entering the game code on their devices. Once everyone has
      joined, you can start the quiz and watch the fun unfold in real-time!
    </p>

    <b>Quiz</b>
    <div class="khc-start-quiz__quiz-box">
      <select name="" id="">
        <option value="">Quiz 1</option>
      </select>
    </div>

    <div class="d-flex w-100 mt-4">
      <button class="btn btn-info mt-4">Start Quiz</button>
    </div>
  </div>
</div>
