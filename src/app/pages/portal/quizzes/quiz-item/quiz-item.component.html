<div class="khc-quiz-item card shadow-sm">
  <!-- <button class="khc-quizzes__quiz-item-delete">
        <i class="fa fa-solid fa-x text-danger"></i>
    </button> -->

  <div
    class="card-img-top"
    alt="Quiz card bg"
    [ngStyle]="{ backgroundImage: 'url(/assets/images/card-bg-' + imageNo + '.png)' }"
  ></div>
  <div class="card-body d-flex flex-column justify-content-between p-0">
    <div class="d-flex flex-column p-3 header">
      <small class="d-block">Mar 8, 2026</small>
      <hr class="m-0 mt-2 mb-2" />
      <!-- Quiz title -->
      <div>
        <h5 class="card-title mt-2">JavaScript Basics Quiz</h5>

        <!-- Status + Questions -->
        <div class="d-flex align-items-center mt-4">
          <div class="d-flex align-items-center">
            <div class="khc-quiz-item__status bg-warning me-2">
              <i class="fa fa-solid fa-question"></i>
            </div>
            <small>10 Questions</small>
          </div>

          <div class="d-flex align-items-center ms-3">
            <div class="khc-quiz-item__status bg-success me-2">
              <i class="fa fa-solid fa-check"></i>
            </div>
            <small>Published</small>
          </div>
        </div>
      </div>
    </div>
    <!-- Last modified -->

    <!-- Edit button -->
    <div class="d-flex bg-white p-3">
      <button class="btn btn-info btn-sm flex-auto">
        <i class="fa fa-solid fa-play"></i>
        Start
      </button>
      <button class="btn btn-secondary btn-sm ms-2 flex-auto">
        <i class="fa fa-solid fa-pencil"></i>
        Edit
      </button>
    </div>
  </div>
</div>
