<div class="khc-add-quiz__question-form">
  <div class="khc-add-quiz__question-form-main">
  
    <input
      type="text"
      class="khc-add-quiz__question-form-title-input mt-md-5 mt-2"
      placeholder="Type question"
    />
    <div class="khc-add-quiz__question-media">
      <i class="fa fa-regular fa-image"></i>

      <span class="mt-3">Click to add media</span>
      <i class="text-muted">Max file size 2mb, accepted (.jpg/.png/.gif)</i>
    </div>

    <div class="khc-add-quiz__question-options">
      <div class="khc-add-quiz__question-option-item">
        <div class="checkbox ms-2">
          <input type="checkbox" />
        </div>
        <input class="ms-2" type="text" placeholder="Add answer 1" />
        <!-- <div>
              <i class="fa fa-regular fa-image"></i>
            </div> -->
      </div>
      <div class="khc-add-quiz__question-option-item">
        <div class="checkbox ms-2">
          <input type="checkbox" />
        </div>
        <input class="ms-2" type="text" placeholder="Add answer 2" />
        <!-- <div>
              <i class="fa fa-regular fa-image"></i>
            </div> -->
      </div>
      <div class="khc-add-quiz__question-option-item">
        <div class="checkbox ms-2">
          <input type="checkbox" />
        </div>
        <input class="ms-2" type="text" placeholder="Add answer 3" />
        <!-- <div>
              <i class="fa fa-regular fa-image"></i>
            </div> -->
      </div>
      <div class="khc-add-quiz__question-option-item">
        <div class="checkbox ms-2">
          <input type="checkbox" />
        </div>
        <input class="ms-2" type="text" placeholder="Add answer 4" />
        <!-- <div>
              <i class="fa fa-regular fa-image text-muted"></i>
            </div> -->
      </div>
    </div>
  </div>
  <button
    *ngIf="isMobile"
    type="button"
    class="khc-add-quiz__floating-config-btn btn btn-secondary"
    (click)="toggleConfigPanel()"
    aria-label="Toggle question settings"
  >
    <i *ngIf="!isConfigOpen" class="fa fa-sliders"></i>
    <i *ngIf="isConfigOpen" class="fa fa-times"></i>
  </button>

  <div
    *ngIf="!isMobile || isConfigOpen"
    class="khc-add-quiz__question-form-config"
    [class.khc-add-quiz__question-form-config--floating]="isMobile"
  >
    <span class="khc-add-quiz__question-form-config-title">Question properties</span>
    <hr />
    <div class="row">
      <div class="d-flex flex-column">
        <label for="">Time limit</label>
        <select name="" id="">
          <option value="">20 seconds</option>
        </select>
      </div>

      <div class="d-flex flex-column mt-3">
        <label for="">Points</label>
        <select name="" id="">
          <option value="">Standard</option>
        </select>
      </div>
    </div>
  </div>
</div>
