<div class="khc-quizzes">
  <div class="container-lg">
    <div class="d-flex justify-content-between">
      <h4>My Quizzes</h4>

      <button class="btn btn-secondary">Add Quizz</button>
    </div>
    <div class="d-flex flex-wrap justify-content-between pt-5">
      @for (item of [1,2,3,4,5,6]; track $index) {

      <div class="khc-quizzes__quiz-item card shadow-sm mt-3 mb-3">
        <div class="card-body d-flex flex-column justify-content-between">
          <!-- Last modified -->
          <small class="text-muted d-block">Last modified: Mar 8, 2026</small>

          <!-- Quiz title -->
          <div>
            <h5 class="card-title">JavaScript Basics Quiz</h5>

            <!-- Status + Questions -->
            <div class="d-flex align-items-center">
              <span class="badge bg-success">Published</span>
              <span class="text-muted ms-3"><small>10 Questions</small></span>
            </div>
          </div>

          <!-- Edit button -->
          <div class="d-flex">
            <button class="btn btn-secondary btn-sm flex-auto">
              <i class="fa fa-solid fa-x text-danger"></i>
              Delete
            </button>
            <button class="btn btn-primary btn-sm ms-2 flex-auto">
              <i class="fa fa-solid fa-pencil"></i>
              Edit
            </button>
          </div>
        </div>
      </div>
      }
    </div>
  </div>
</div>
