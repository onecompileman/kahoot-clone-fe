<div class="khc-register">
  <div class="d-flex">
    <a [routerLink]="['/']" class="btn btn-secondary khc-register__back">Back</a>
  </div>
  <div class="khc-register__register-card">
    <span class="khc-register__register-card-title">Register</span>

    <div class="d-flex mt-4">
      <button class="btn btn-secondary w-100">
        <img src="/assets/icons/icons8-google-96.png" alt="Google" height="24" />
        <span>Sign in via Google</span>
      </button>
    </div>
    <div class="d-flex justify-content-center mt-3">or</div>
    <div class="row mt-1">
      <div class="col d-flex flex-column">
        <label for="">Email</label>
        <input type="text" />
      </div>
    </div>

    <button class="btn btn-info mt-4">Continue</button>
    <label class="mt-3">
      Already have an account?
      <a [routerLink]="['/login']">Login</a>
    </label>

    <small class="mt-2 text-muted">
      By signing up, you accept our
      <a (click)="openTermsConditionModal()">Terms and Conditions</a>
    </small>
  </div>
</div>
