<div class="khc-login">
  <a [routerLink]="['/']" class="btn btn-secondary khc-register__back">Back</a>

  <div class="khc-login__login-card">
    <span class="khc-login__login-card-title">Login to your account</span>

    <div class="d-flex mt-4">
      <button class="btn btn-secondary w-100">
        <img src="/assets/icons/icons8-google-96.png" alt="Google" height="24" />
        <span>Sign in via Google</span>
      </button>
    </div>
    <div class="d-flex justify-content-center mt-3">or</div>
    <div class="row mt-3">
      <div class="col d-flex flex-column">
        <label for="">Username or email</label>
        <input type="text" />
      </div>
    </div>

    <div class="row mt-3">
      <div class="col d-flex flex-column">
        <label for="">Password</label>
        <input type="password" />
      </div>
    </div>

    <label class="mt-3">
      Forgot password?
      <a>Reset your password</a>
    </label>

    <button class="btn btn-info mt-3">Log in</button>
    <label class="mt-5">
      Don't have an account?
      <a [routerLink]="['/register']">Register</a>
    </label>

    <small class="mt-2 text-muted">
      By signing up, you accept our
      <a (click)="openTermsConditionModal()">Terms and Conditions</a>
    </small>
  </div>
</div>
